  /ebooks/{id}/author:
    get:
      description: Devuelve el autor asociado a un e-book específico. Requiere autenticación
        JWT.
      parameters:
      - description: UUID del e-book
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Author'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
