        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Eliminar categoría
      tags:
      - categorías
    get:
      description: Devuelve una categoría por su UUID. Requiere autenticación JWT.
      parameters:
      - description: UUID de la categoría
        format: uuid
        in: path
        name: id
        required: true
