  /ebooks/{id}/cover:
    post:
      consumes:
      - multipart/form-data
      description: |-
        Sube una imagen de portada para un e-book existente y actualiza su registro.
        Formatos aceptados: JPG, JPEG, PNG, WebP. Tamaño máximo: 5 MB.
        Requiere autenticación JWT.
      parameters:
      - description: UUID del e-book
        format: uuid
        in: path
        name: id
        required: true
        type: string
      - description: Imagen de portada (JPG/PNG/WebP, máx 5 MB)
        in: formData
        name: cover
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.UploadCoverResponse'
        "400":
          description: UUID inválido, formato no soportado o archivo muy grande
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: No autenticado
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: E-book no encontrado
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Error interno o de storage
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Subir portada de e-book
      tags:
      - uploads
  /ebooks/{id}/file:
    post:
      consumes:
      - multipart/form-data
      description: |-
        Sube un archivo de e-book (PDF, EPUB o MOBI) y lo asocia al e-book indicado.
        Tamaño máximo: 50 MB. Requiere autenticación JWT.
      parameters:
      - description: UUID del e-book
        format: uuid
        in: path
        name: id
        required: true
        type: string
      - description: Archivo del libro (PDF/EPUB/MOBI, máx 50 MB)
        in: formData
        name: file
        required: true
        type: file
      - description: Formato del archivo
        enum:
        - pdf
        - epub
        - mobi
        in: formData
        name: format
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
