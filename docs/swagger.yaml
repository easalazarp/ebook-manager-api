          $ref: '#/definitions/service.CreateAuthorInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Author'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Crear autor
      tags:
      - autores
  /authors/{id}:
    delete:
      description: Elimina un autor por su UUID. Requiere autenticación JWT.
      parameters:
      - description: UUID del autor
        format: uuid
        in: path
        name: id
        required: true
        type: string
