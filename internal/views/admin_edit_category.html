{{define "title"}}Editar Categoría — Admin{{end}}
{{define "content"}}
<div class="max-w-2xl mx-auto">
    <div class="flex items-center gap-2 text-sm mb-6">
        <a href="/admin#categories" class="text-gray-400 hover:text-gray-600 transition">Panel</a>
        <span class="text-gray-300">›</span>
        <span class="text-gray-700 font-medium">Editar Categoría</span>
    </div>

    {{if .Error}}
    <div class="mb-5 p-4 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm font-medium">
        ⚠️ {{.Error}}
    </div>
    {{end}}

    <form method="POST" action="/admin/categories/{{.Category.ID}}"
        class="bg-white rounded-xl border border-gray-100 shadow-sm p-8 space-y-6">

        <div>
            <label for="name" class="block text-sm font-semibold text-gray-700 mb-1">
                Nombre <span class="text-red-400">*</span>
            </label>
            <input type="text" id="name" name="name" required value="{{.Category.Name}}"
                placeholder="Ej: Ciencia Ficción"
                class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"
                oninput="updateSlug(this.value)">
            <p class="text-xs text-gray-400 mt-1">El slug se actualizará automáticamente.</p>
        </div>

        <!-- Preview slug -->
        <div class="p-4 bg-gray-50 rounded-lg">
            <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1">Slug actual</p>
            <p class="font-mono text-sm text-amber-600" id="slug-current">{{.Category.Slug}}</p>
            <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide mt-3 mb-1">Nuevo slug (preview)</p>
            <p class="font-mono text-sm text-indigo-600" id="slug-preview">{{.Category.Slug}}</p>
        </div>

        <div class="flex items-center justify-between pt-4 border-t border-gray-100">
            <a href="/admin" class="px-4 py-2 text-sm text-gray-500 hover:text-gray-700 transition">← Cancelar</a>
            <button type="submit"
                class="px-6 py-2.5 bg-indigo-600 text-white text-sm font-semibold rounded-lg hover:bg-indigo-700 transition focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
                Guardar cambios
            </button>
        </div>
    </form>
</div>

<script>
    function updateSlug(value) {
        const preview = document.getElementById('slug-preview');
        if (!value.trim()) { preview.textContent = '—'; return; }
        const slug = value.normalize('NFD').replace(/[\u0300-\u036f]/g, '')
            .toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
        preview.textContent = slug || '—';
    }
</script>
{{end}}
