{{define "title"}}Catálogo de E-Books{{end}}
{{define "content"}}
<h1 class="text-3xl font-bold text-gray-800 mb-8">Catálogo</h1>
<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
    {{range .EBooks}}
    <div class="bg-white rounded-xl shadow hover:shadow-md transition overflow-hidden">
        {{if .CoverURL}}
        <img src="{{.CoverURL}}" alt="{{.Title}}" class="w-full h-48 object-cover">
        {{else}}
        <div class="w-full h-48 bg-indigo-100 flex items-center justify-center text-indigo-400 text-4xl">📖</div>
        {{end}}
        <div class="p-4">
            <h2 class="font-semibold text-gray-800 truncate">{{.Title}}</h2>
            <p class="text-sm text-gray-500 mt-1 line-clamp-2">{{.Description}}</p>
            <a href="/ebooks/{{.ID}}"
               class="mt-3 inline-block text-sm text-indigo-600 hover:underline font-medium">
                Ver detalle →
            </a>
        </div>
    </div>
    {{else}}
    <p class="text-gray-400 col-span-4 text-center py-12">No hay e-books disponibles aún.</p>
    {{end}}
</div>
{{end}}
