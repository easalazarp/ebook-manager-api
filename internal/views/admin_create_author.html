{{define "title"}}Nuevo Autor — Admin{{end}}
{{define "content"}}
<div class="max-w-2xl mx-auto">
    <div class="flex items-center gap-3 mb-8">
        <a href="/admin" class="text-gray-400 hover:text-gray-600 text-sm">← Panel</a>
        <span class="text-gray-300">/</span>
        <h1 class="text-2xl font-bold text-gray-800">Nuevo Autor</h1>
    </div>

    {{if .Error}}
    <div class="mb-6 p-4 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm font-medium">
        ⚠️ {{.Error}}
    </div>
    {{end}}

    <form method="POST" action="/admin/authors" class="bg-white rounded-xl shadow p-8 space-y-6">

        <!-- Nombre -->
        <div>
            <label for="name" class="block text-sm font-semibold text-gray-700 mb-1">
                Nombre <span class="text-red-500">*</span>
            </label>
            <input type="text" id="name" name="name" required placeholder="Ej: Robert C. Martin"
                class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition">
            <p class="text-xs text-gray-400 mt-1">Nombre completo o pseudónimo del autor.</p>
        </div>

        <!-- Biografía -->
        <div>
            <label for="bio" class="block text-sm font-semibold text-gray-700 mb-1">
                Biografía
                <span class="font-normal text-gray-400">(opcional)</span>
            </label>
            <textarea id="bio" name="bio" rows="4"
                placeholder="Breve descripción del autor, sus obras principales o especialidad..."
                class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none transition"></textarea>
        </div>

        <!-- Preview del avatar -->
        <div class="p-4 bg-gray-50 rounded-lg flex items-center gap-4">
            <div id="avatar-preview"
                class="w-12 h-12 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 text-xl font-bold flex-shrink-0">
                ?
            </div>
            <div>
                <p class="text-sm font-medium text-gray-700" id="name-preview">Nombre del autor</p>
                <p class="text-xs text-gray-400">Así aparecerá en el catálogo</p>
            </div>
        </div>

        <!-- Botones -->
        <div class="flex items-center justify-between pt-4 border-t border-gray-100">
            <a href="/admin" class="px-4 py-2 text-sm text-gray-500 hover:text-gray-700 transition">
                Cancelar
            </a>
            <button type="submit"
                class="px-6 py-2.5 bg-indigo-600 text-white text-sm font-semibold rounded-lg hover:bg-indigo-700 transition focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
                Guardar Autor
            </button>
        </div>
    </form>
</div>

<script>
    // Actualiza la preview del avatar con la inicial del nombre conforme el usuario escribe.
    const nameInput = document.getElementById('name');
    const avatar = document.getElementById('avatar-preview');
    const namePrev = document.getElementById('name-preview');

    nameInput.addEventListener('input', function () {
        const val = this.value.trim();
        if (val) {
            avatar.textContent = val.charAt(0).toUpperCase();
            namePrev.textContent = val;
        } else {
            avatar.textContent = '?';
            namePrev.textContent = 'Nombre del autor';
        }
    });
</script>
{{end}}
