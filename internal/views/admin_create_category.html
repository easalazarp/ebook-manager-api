{{define "title"}}Nueva Categoría — Admin{{end}}
{{define "content"}}
<div class="max-w-2xl mx-auto">
    <div class="flex items-center gap-3 mb-8">
        <a href="/admin" class="text-gray-400 hover:text-gray-600 text-sm">← Panel</a>
        <span class="text-gray-300">/</span>
        <h1 class="text-2xl font-bold text-gray-800">Nueva Categoría</h1>
    </div>

    {{if .Error}}
    <div class="mb-6 p-4 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm font-medium">
        ⚠️ {{.Error}}
    </div>
    {{end}}

    <form method="POST" action="/admin/categories" class="bg-white rounded-xl shadow p-8 space-y-6">

        <!-- Nombre -->
        <div>
            <label for="name" class="block text-sm font-semibold text-gray-700 mb-1">
                Nombre <span class="text-red-500">*</span>
            </label>
            <input type="text" id="name" name="name" required placeholder="Ej: Ciencia Ficción"
                class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
                oninput="updateSlug(this.value)">
            <p class="text-xs text-gray-400 mt-1">
                El slug se genera automáticamente.
            </p>
        </div>

        <!-- Preview del slug -->
        <div class="p-4 bg-gray-50 rounded-lg">
            <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1">Slug generado</p>
            <p class="font-mono text-sm text-indigo-600" id="slug-preview">—</p>
            <p class="text-xs text-gray-400 mt-1">
                Identificador único URL-friendly. Se crea automáticamente desde el nombre.
            </p>
        </div>

        <!-- Botones -->
        <div class="flex items-center justify-between pt-4 border-t border-gray-100">
            <a href="/admin" class="px-4 py-2 text-sm text-gray-500 hover:text-gray-700 transition">
                Cancelar
            </a>
            <button type="submit"
                class="px-6 py-2.5 bg-indigo-600 text-white text-sm font-semibold rounded-lg hover:bg-indigo-700 transition focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
                Guardar Categoría
            </button>
        </div>
    </form>
</div>

<script>
    // Genera una preview del slug en tiempo real usando la misma lógica del servidor:
    // normalizar acentos → minúsculas → reemplazar no-alfanuméricos por guión.
    // Es solo una preview visual; el slug real lo calcula el servidor para garantizar
    // consistencia (el servidor es la fuente de verdad).
    function updateSlug(value) {
        const preview = document.getElementById('slug-preview');
        if (!value.trim()) {
            preview.textContent = '—';
            return;
        }
        // Normalizar acentos usando la API del navegador
        const normalized = value.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
        // Minúsculas, reemplazar no-alfanuméricos por guión, limpiar guiones dobles y extremos
        const slug = normalized
            .toLowerCase()
            .replace(/[^a-z0-9]+/g, '-')
            .replace(/^-+|-+$/g, '');
        preview.textContent = slug || '—';
    }
</script>
{{end}}
