{{define "title"}}Registro{{end}}
{{define "content"}}
<div class="max-w-md mx-auto bg-white rounded-xl shadow p-8 mt-12">
    <h1 class="text-2xl font-bold mb-6 text-gray-800">Crear cuenta</h1>
    {{if .Error}}<p class="text-red-500 text-sm mb-4">{{.Error}}</p>{{end}}
    <form method="POST" action="/register" class="space-y-4">
        <input type="email" name="email" placeholder="Email"
               class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500" required>
        <input type="password" name="password" placeholder="Contraseña (mín. 6 caracteres)"
               class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500" required>
        <button type="submit"
                class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 font-semibold">
            Registrarse
        </button>
    </form>
    <p class="text-sm text-center mt-4 text-gray-500">
        ¿Ya tienes cuenta? <a href="/login" class="text-indigo-600 hover:underline">Inicia sesión</a>
    </p>
</div>
{{end}}
