{{define "title"}}Editar Autor — Admin{{end}}
{{define "content"}}
<div class="max-w-2xl mx-auto">
    <div class="flex items-center gap-2 text-sm mb-6">
        <a href="/admin#authors" class="text-gray-400 hover:text-gray-600 transition">Panel</a>
        <span class="text-gray-300">›</span>
        <span class="text-gray-700 font-medium">Editar Autor</span>
    </div>

    {{if .Error}}
    <div class="mb-5 p-4 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm font-medium">
        ⚠️ {{.Error}}
    </div>
    {{end}}

    <form method="POST" action="/admin/authors/{{.Author.ID}}"
        class="bg-white rounded-xl border border-gray-100 shadow-sm p-8 space-y-6">

        <div>
            <label for="name" class="block text-sm font-semibold text-gray-700 mb-1">
                Nombre <span class="text-red-400">*</span>
            </label>
            <input type="text" id="name" name="name" required value="{{.Author.Name}}"
                placeholder="Ej: Robert C. Martin"
                class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"
                oninput="updatePreview(this.value)">
        </div>

        <div>
            <label for="bio" class="block text-sm font-semibold text-gray-700 mb-1">
                Biografía <span class="font-normal text-gray-400">(opcional)</span>
            </label>
            <textarea id="bio" name="bio" rows="4" placeholder="Breve descripción del autor..."
                class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none transition">{{.Author.Bio}}</textarea>
        </div>

        <!-- Preview -->
        <div class="p-4 bg-gray-50 rounded-lg flex items-center gap-4">
            <div id="avatar-preview"
                class="w-12 h-12 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 text-xl font-bold flex-shrink-0">
                {{slice .Author.Name 0 1}}
            </div>
            <div>
                <p class="text-sm font-medium text-gray-700" id="name-preview">{{.Author.Name}}</p>
                <p class="text-xs text-gray-400">Así aparecerá en el catálogo</p>
            </div>
        </div>

        <div class="flex items-center justify-between pt-4 border-t border-gray-100">
            <a href="/admin" class="px-4 py-2 text-sm text-gray-500 hover:text-gray-700 transition">← Cancelar</a>
            <button type="submit"
                class="px-6 py-2.5 bg-indigo-600 text-white text-sm font-semibold rounded-lg hover:bg-indigo-700 transition focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
                Guardar cambios
            </button>
        </div>
    </form>
</div>

<script>
    function updatePreview(val) {
        document.getElementById('avatar-preview').textContent = val ? val.charAt(0).toUpperCase() : '?';
        document.getElementById('name-preview').textContent = val || 'Nombre del autor';
    }
</script>
{{end}}
